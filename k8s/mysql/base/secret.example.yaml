# Example secret (edit & apply). NOTE: values are plain stringData for convenience.
apiVersion: v1
kind: Secret
metadata:
  name: infra-orch-mysql
  labels:
    app.kubernetes.io/name: infra-orch-mysql
type: Opaque
stringData:
  MYSQL_HOST: infra-orch-mysql
  MYSQL_PORT: "3306"
  MYSQL_DB: infra_orch
  MYSQL_USER: infra_orch
  MYSQL_PASSWORD: infra_orch_app
  MYSQL_ROOT_PASSWORD: change-me-root
