apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-orch-web
  labels:
    app.kubernetes.io/name: infra-orch-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infra-orch-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infra-orch-web
    spec:
      containers:
        - name: web
          image: 10.10.0.190:32000/infra-orch-web:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
