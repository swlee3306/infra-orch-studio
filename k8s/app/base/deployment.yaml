apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-orch-api
  labels:
    app.kubernetes.io/name: infra-orch-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infra-orch-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infra-orch-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: 10.10.0.190:32000/infra-orch-studio:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: infra-orch-runtime
            - secretRef:
                name: infra-orch-mysql
            - secretRef:
                name: infra-orch-admin
          volumeMounts:
            - name: clouds
              mountPath: /etc/openstack
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: clouds
          secret:
            secretName: openstack-clouds
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-orch-runner
  labels:
    app.kubernetes.io/name: infra-orch-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infra-orch-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infra-orch-runner
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: runner
          image: 10.10.0.190:32000/infra-orch-studio:dev
          imagePullPolicy: IfNotPresent
          command: [/app/infra-orch-runner]
          envFrom:
            - configMapRef:
                name: infra-orch-runtime
            - secretRef:
                name: infra-orch-mysql
          volumeMounts:
            - name: clouds
              mountPath: /etc/openstack
              readOnly: true
            - name: workdirs
              mountPath: /workdirs
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: clouds
          secret:
            secretName: openstack-clouds
        - name: workdirs
          persistentVolumeClaim:
            claimName: infra-orch-workdirs
