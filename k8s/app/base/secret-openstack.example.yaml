# Example OpenStack clouds secret used by API/Runner.
# Replace all placeholder values and apply this file separately from kustomize overlays.
apiVersion: v1
kind: Secret
metadata:
  name: openstack-clouds
  labels:
    app.kubernetes.io/name: openstack-clouds
type: Opaque
stringData:
  clouds.yaml: |
    clouds:
      exporter-internal:
        region_name: RegionOne
        identity_api_version: 3
        interface: internal
        identity_interface: internal
        auth:
          auth_url: https://openstack.example.invalid:5000/v3
          username: replace-me
          password: replace-me
          project_name: replace-me
          user_domain_name: Default
          project_domain_name: Default
        endpoint_overrides:
          identity: https://openstack.example.invalid:5000/v3
          compute: https://openstack.example.invalid:8774/v2.1
          network: https://openstack.example.invalid:9696
          image: https://openstack.example.invalid:9292
          volumev3: https://openstack.example.invalid:8776/v3
          placement: https://openstack.example.invalid:8778
