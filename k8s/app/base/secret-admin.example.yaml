# Example secret. Replace values before production use and apply separately from kustomize overlays.
apiVersion: v1
kind: Secret
metadata:
  name: infra-orch-admin
  labels:
    app.kubernetes.io/name: infra-orch-admin
type: Opaque
stringData:
  ADMIN_EMAIL: admin@example.com
  ADMIN_PASSWORD: replace-me
  # Used by the API to encrypt provider connection passwords before storing them.
  PROVIDER_SECRET_KEY: replace-with-long-random-secret
