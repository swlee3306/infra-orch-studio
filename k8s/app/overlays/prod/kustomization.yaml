apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: infra

resources:
- ../../base
- ../../../../k8s/mysql/base
- ingress.yaml

images:
- name: 10.10.0.190:32000/infra-orch-studio
  newName: 10.10.0.190:32000/infra-orch-studio
  newTag: "5c7c98b"
- name: 10.10.0.190:32000/infra-orch-web
  newName: 10.10.0.190:32000/infra-orch-web
  newTag: "5c7c98b"

replicas:
  - name: infra-orch-api
    count: 2
  - name: infra-orch-runner
    count: 1
  - name: infra-orch-web
    count: 2

patches:
- target:
    kind: ConfigMap
    name: infra-orch-runtime
  patch: |-
    - op: add
      path: /data/SESSION_COOKIE_SECURE
      value: "true"
