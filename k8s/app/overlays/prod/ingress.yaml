apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infra-orch-web
spec:
  ingressClassName: nginx
  rules:
    - host: infra-orch.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infra-orch-web
                port:
                  number: 80
