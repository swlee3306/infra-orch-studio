apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-orch-api
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infra-orch-api
  template:
    metadata:
      labels:
        app: infra-orch-api
    spec:
      containers:
        - name: api
          image: 10.10.0.190:32000/infra-orch-studio:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: infra-orch-mysql
            - secretRef:
                name: infra-orch-admin
          env:
            - name: API_ADDR
              value: ":8080"
            - name: MYSQL_BIN
              value: "mysql"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
