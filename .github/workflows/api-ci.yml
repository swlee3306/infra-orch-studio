name: api-ci

on:
  push:
    branches: [ main ]
    paths:
      - "cmd/**"
      - "internal/**"
      - "templates/**"
      - "third_party/**"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      - "hack/**"
      - "k8s/app/**"
      - ".github/workflows/api-ci.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build_push_and_bump:
    # Prevent infinite loop when this workflow bumps the tag and pushes a commit
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(cd): bump infra-orch-studio image') }}
    runs-on: self-hosted
    env:
      REGISTRY: 10.10.0.190:32000
      IMAGE: infra-orch-studio
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute tag
        id: vars
        shell: bash
        run: |
          echo "TAG=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build api/runner image
        shell: bash
        run: |
          docker build -t "$REGISTRY/$IMAGE:${{ steps.vars.outputs.TAG }}" .

      - name: Push api/runner image
        shell: bash
        run: |
          docker push "$REGISTRY/$IMAGE:${{ steps.vars.outputs.TAG }}"

      - name: Update kustomize overlay tag
        shell: bash
        run: |
          set -e
          FILE=k8s/app/overlays/prod/kustomization.yaml
          TAG="${{ steps.vars.outputs.TAG }}"
          perl -0777 -i -pe "s/(name: 10\\.10\\.0\\.190:32000\\/infra-orch-studio\\n\\s+newName: 10\\.10\\.0\\.190:32000\\/infra-orch-studio\\n\\s+newTag: )[^\\n]+/\${1}$TAG/" "$FILE"
          git diff -- "$FILE" || true

      - name: Commit and push
        shell: bash
        run: |
          set -e
          git config user.name "infra-orch-studio-ci"
          git config user.email "infra-orch-studio-ci@users.noreply.github.com"
          git add k8s/app/overlays/prod/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(cd): bump infra-orch-studio image to ${{ steps.vars.outputs.TAG }}"
          git push
